name: Deploy Server
on:
  workflow_call:
    inputs:
      appname:
        description: 'Enter the appname'
        required: True
        type: string
      env:
        description: 'Enter the environment'
        required: True
        type: string
      db_connection:
        description: 'Enter the database connection'
        required: True
        type: string

jobs:
  deploy_server:
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact from another workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          name: Dotnet artifact
          path: ./output

      - name: Show output
        run: ls ./output

      - name: Replace fields
        uses: cschleiden/replace-tokens@v1
        with:
          files: '["./output/appsettings.json"]'
        env:
          APP_NAME: ${{ inputs.appname }}
          ENV: ${{ inputs.env }}
          DB_CONNECTION: ${{ inputs.db_connection }}

      - name: Show file
        run: cat ./output/appsettings.json