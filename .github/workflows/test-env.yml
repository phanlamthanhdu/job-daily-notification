name: Test environment

on:
  workflow_dispatch:

jobs:
  get_vars:
    runs-on: ubuntu-latest
    outputs: 
      tf_var: ${{steps.get_tf_var.outputs.tf_var}}
    strategy:
      matrix:
        envs: [E1,E2,E3]
    environment: ${{matrix.envs}}
      
    steps:
      - id: get_tf_var
        run: |
          echo "tf_var=${{vars.VAR1}}" >> $GITHUB_OUTPUT

