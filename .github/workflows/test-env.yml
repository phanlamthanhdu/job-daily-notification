name: Test environment

on:
  workflow_dispatch:

jobs:
  build-infra:
    name: "Test"

    strategy:
      matrix:
        include:
          - workspace: dev
            tf_config: tf_dev
          - workspace: sit
            tf_config: tf_sit
          - workspace: uat
            tf_config: tf_uat
          - workspace: prod
            tf_config: tf_prod

    uses: ./.github/workflows/call_apply.yml
    with: 
      appname: ${{ matrix.workspace }}
    secrets:
      env_vars: |
        TF_CONFIG=${{matrix.tf_config}}