name: Test environment

on:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs: 
      matrix: ${{steps.get_matrix.outputs.matrix}}
      
    steps:
      - id: get_matrix
        shell: python
        run: |
          import json
          import os

          matrix = []

          envs = [dev, sit, prod]
          tf_vars = [TF_NONPROD_DEV, TF_NONPROD_SIT, TF_PROD_PROD]

          for e,v in zip(envs,tf_vars):
            matrix.append({
              workspace: e,
              tf_config: v
            })

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(config)}\n")

  build-infra:
    needs: prepare
    strategy:
      matrix:
        include: ${{needs.prepare.outputs.matrix}}
    uses: ./.github/workflows/call_apply.yml
    with: 
      workspace: ${{matrix.workspace}}
    secrets:
      env_vars: |
        TF_CONFIG=${{matrix.tf_config}}