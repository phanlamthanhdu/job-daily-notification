name: Build Devsit
on:
  workflow_dispatch:

jobs:
  build_app:
    runs-on: ubuntu-latest

    outputs:
      artifact_name: ${{ steps.define_artifact.outputs.artifact_name }}

    steps:  
      - name: Checkout Code 
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Build Dotnet
        run: dotnet build -c Release
    
      - name: Publish Dotnet
        run: dotnet publish -c Release -o ./publish_output

      - name: Define artifact
        id: define_artifact
        run: |
          ATF_NAME="Dotnet artifact"
          echo "artifact_name=$ATF_NAME" >> $GITHUB_OUTPUT # Pass value to $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.define_artifact.outputs.artifact_name }}
          path: ./publish_output

  pass_dev_inputs:
    needs: build_app
    strategy:
      matrix:
        include:
          - appname: dev1
            env: dev_env1
            db_connection: dev_db1
          - appname: dev2
            env: dev_env2
            db_connection: dev_db2

    uses: ./.github/workflows/deploy_devsit.yml
    with:
      appname: ${{ matrix.appname }}
      env: ${{ matrix.env }}
      db_connection: ${{ matrix.db_connection }}
      artifact_name: ${{ needs.build_app.outputs.artifact_name }}

  pass_sit_inputs:
    needs: pass_dev_inputs
    strategy:
      matrix:
        include:
          - appname: sit1
            env: sit_env1
            db_connection: sit_db1
          - appname: sit2
            env: sit_env2
            db_connection: sit_db2

    uses: ./.github/workflows/deploy_devsit.yml
    with:
      appname: ${{ matrix.appname }}
      env: ${{ matrix.env }}
      db_connection: ${{ matrix.db_connection }}
      artifact_name: ${{ needs.build_app.outputs.artifact_name }}