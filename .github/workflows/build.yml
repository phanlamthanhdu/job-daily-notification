name: Build Dotnet
on:
  workflow_dispatch:
  



  
jobs:
  build-app:
    runs-on: ubuntu-latest
    environment: BUILD_ENV
    outputs:
      artifact_name: ${{ steps.define_artifact.outputs.artifact_name }}

    steps:  
      - name: Checkout Code 
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Build Dotnet
        run: dotnet build -c Release
    
      - name: Publish Dotnet
        run: dotnet publish -c Release -o ./publish_output

      - name: Test command
        run: |
          pwd
          ls ./.github/workflows

      - name: Define artifact
        id: define_artifact
        run: |
          ATF_NAME="${{ vars.ATF_NAME }}"
          echo "artifact_name=$ATF_NAME" >> $GITHUB_OUTPUT # Pass value to $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.define_artifact.outputs.artifact_name }}
          path: ./publish_output

  pass-inputs:
    needs: build-app
    uses: ./.github/workflows/deploy.yml
    with:
      appname: ${{ vars.APPNAME }}
      env: ${{ vars.ENV }}
      db_connection: ${{ vars.DB }}
      artifact_name: ${{ needs.build-app.outputs.artifact_name }}
